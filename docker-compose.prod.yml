services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tmm_prod_app
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: tmm_prod_nginx
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal
      - proxy_net

  mysql:
    image: mysql:8.0
    container_name: tmm_prod_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-tmm}
      MYSQL_USER: ${DB_USERNAME:-tmm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: tmm_prod_redis
    restart: unless-stopped
    networks:
      - internal

  mailhog:
    image: mailhog/mailhog
    container_name: tmm_prod_mailhog
    restart: unless-stopped
    networks:
      - internal

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tmm_prod_queue
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=90
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tmm_prod_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
  proxy_net:
    external: true

volumes:
  mysql_data:
    name: tmm_prod_mysql_data
