services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tmm_app
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tmm

  nginx:
    image: nginx:alpine
    container_name: tmm_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - tmm

  mysql:
    image: mysql:8.0
    container_name: tmm_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tmm
      MYSQL_USER: tmm
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tmm

  redis:
    image: redis:7-alpine
    container_name: tmm_redis
    ports:
      - "6379:6379"
    networks:
      - tmm

  mailhog:
    image: mailhog/mailhog
    container_name: tmm_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tmm

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tmm_queue
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=90
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - tmm

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tmm_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    ports:
      - "6001:6001"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - tmm

networks:
  tmm:
    driver: bridge

volumes:
  mysql_data:
