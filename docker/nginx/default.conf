server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Docker internal DNS — resolves upstream hosts at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 50M;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # Proxy WebSocket connections for Laravel Reverb
    # Using a variable so Nginx resolves the upstream at request time, not startup
    location /app {
        set $reverb reverb:6001;
        proxy_pass http://$reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
